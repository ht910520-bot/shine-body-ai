<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>登入｜閃耀體態</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #352f42; background: radial-gradient(circle at top, #fff3f8, #f4f0ff 55%, #e9f7f5); }
      main { width: min(100%, 400px); padding: 34px 28px; background: rgba(255,255,255,.94); border: 1px solid rgba(117,93,145,.13); border-radius: 26px; box-shadow: 0 24px 70px rgba(80,60,110,.16); }
      .mark { width: 58px; height: 58px; display: grid; place-items: center; margin-bottom: 18px; border-radius: 18px; color: white; font-size: 28px; background: linear-gradient(135deg, #f082ad, #8d76d6); }
      h1 { margin: 0; font-size: 27px; }
      p { color: #756d7e; line-height: 1.6; }
      label { display: block; margin: 24px 0 8px; font-weight: 700; }
      input { width: 100%; min-height: 50px; padding: 0 15px; border: 1px solid #d9d1e3; border-radius: 14px; font: inherit; outline: none; }
      input:focus { border-color: #9b7ed4; box-shadow: 0 0 0 4px rgba(155,126,212,.13); }
      button { width: 100%; min-height: 50px; margin-top: 14px; border: 0; border-radius: 14px; color: white; font: inherit; font-weight: 800; cursor: pointer; background: linear-gradient(135deg, #e978a5, #856fd0); }
      button:disabled { opacity: .65; cursor: wait; }
      #status { min-height: 24px; margin: 12px 0 0; color: #b64262; font-size: 14px; }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">✦</div>
      <h1>閃耀體態</h1>
      <p>這是私人使用的健康紀錄工具，請輸入登入密碼。</p>
      <form id="loginForm">
        <label for="password">登入密碼</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required autofocus />
        <button id="submitButton" type="submit">登入</button>
        <div id="status" role="alert" aria-live="polite"></div>
      </form>
    </main>
    <script>
      const form = document.getElementById('loginForm');
      const button = document.getElementById('submitButton');
      const status = document.getElementById('status');
      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        status.textContent = '';
        button.disabled = true;
        button.textContent = '登入中…';
        try {
          const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: form.password.value })
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.error || '登入失敗');
          const next = new URLSearchParams(location.search).get('next');
          location.replace(next && next.startsWith('/') ? next : '/');
        } catch (error) {
          status.textContent = error.message || '登入失敗，請稍後再試。';
          form.password.select();
        } finally {
          button.disabled = false;
          button.textContent = '登入';
        }
      });
    </script>
  </body>
</html>
